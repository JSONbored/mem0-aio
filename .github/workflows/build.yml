name: CI / Mem0 AIO

on:
  push:
    branches: [main]
    paths:
      - .github/**
      - .github/workflows/**
      - .trunk/**
      - AGENTS.md
      - CHANGELOG.md
      - Dockerfile
      - README.md
      - SECURITY.md
      - SUPPORT.md
      - assets/**
      - cliff.toml
      - components.toml
      - components/**
      - docs/**
      - docs/upstream/**
      - mem0-aio.xml
      - openmemory
      - openmemory/**
      - pyproject.toml
      - renovate.json
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - upstream.toml
  pull_request:
    branches: [main]
    paths:
      - .github/**
      - .github/workflows/**
      - .trunk/**
      - AGENTS.md
      - CHANGELOG.md
      - Dockerfile
      - README.md
      - SECURITY.md
      - SUPPORT.md
      - assets/**
      - cliff.toml
      - components.toml
      - components/**
      - docs/**
      - docs/upstream/**
      - mem0-aio.xml
      - openmemory
      - openmemory/**
      - pyproject.toml
      - renovate.json
      - requirements-dev.txt
      - rootfs/**
      - scripts/**
      - tests/**
      - upstream.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aio-build:
    uses: JSONbored/aio-fleet/.github/workflows/aio-build.yml@294c30f6f88dcabf2ef7467f0def0ad4e3b18b74
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      app_slug: mem0-aio
      image_name: jsonbored/mem0-aio
      workflow_title: CI / Mem0 AIO
      docker_cache_scope: mem0-aio-image
      pytest_image_tag: mem0-aio:pytest
      publish_profile: changelog-version
      upstream_name: Mem0
      image_description: Unraid-first AIO wrapper image for Mem0 and OpenMemory
      python_version: "3.13"
      trunk_org_slug: aethereal
      publish_platforms: linux/amd64,linux/arm64
      checkout_submodules: true
      integration_pytest_args: tests/integration -m integration
      run_extended_integration: false
      extended_integration_pytest_args: ""
      generator_check_command: ""
      upstream_digest_arg: UPSTREAM_IMAGE_DIGEST
      catalog_published: true
      xml_paths: |
        mem0-aio.xml
        assets/**
      extra_publish_paths: |
        openmemory
        openmemory/**
      catalog_assets: |
        mem0-aio.xml|mem0-aio.xml
        assets/mem0.jpeg|icons/mem0.jpeg
    secrets: inherit
