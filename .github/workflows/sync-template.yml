name: Sync Template to Awesome-Unraid

on:
  push:
    paths:
      - 'mem0-aio.xml'
      - '.github/workflows/sync-template.yml'
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: JSONbored/awesome-unraid
          token: ${{ secrets.SYNC_TOKEN }}
          path: target-repo
          
      - name: Copy and Commit Template
        run: |
          cp mem0-aio.xml target-repo/mem0-aio.xml
          cd target-repo
          git config user.name "JSONbored"
          git config user.email "JSONbored@users.noreply.github.com"
          git add mem0-aio.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync mem0-aio.xml from upstream" && git push)
